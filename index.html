<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEPS 단어 짝맞추기</title>
    <style>
        :root { --main-yellow: #FFD700; --bg-paper: #fdfdfd; --line-gray: #e0e0e0; --text-dark: #333; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #d1d1d1; display: flex; justify-content: center; margin: 0; padding: 20px; }
        
        /* 전체 컨테이너 (스마트폰 화면 느낌) */
        .phone-screen { background: #333; padding: 10px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
        .app-container { background: var(--bg-paper); border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; min-height: 650px; position: relative; }
        
        /* 상단 바 */
        .header { background: #2c3e50; color: var(--main-yellow); padding: 15px; text-align: center; font-weight: bold; font-size: 1.1rem; }
        
        /* 문제 영역 */
        .quiz-body { flex: 1; padding: 20px; display: flex; justify-content: space-between; gap: 10px; background-image: linear-gradient(var(--line-gray) 1px, transparent 1px); background-size: 100% 40px; }
        .column { width: 48%; display: flex; flex-direction: column; gap: 12px; z-index: 1; }
        
        /* 카드 스타일 */
        .card { background: white; border: 1px solid #ccc; border-radius: 8px; padding: 15px 5px; text-align: center; cursor: pointer; font-size: 0.9rem; transition: 0.2s; min-height: 50px; display: flex; align-items: center; justify-content: center; box-shadow: 2px 2px 5px rgba(0,0,0,0.05); word-break: keep-all; font-weight: 500; }
        .card:hover { transform: translateY(-2px); }
        
        /* 상태별 카드 색상 */
        .card.selected { background-color: var(--main-yellow); border-color: #d4af37; box-shadow: inset 0 0 5px rgba(0,0,0,0.1); }
        .card.correct { background-color: #a2ffaf !important; border-color: #2ecc71 !important; color: #155724 !important; pointer-events: none; opacity: 0.8; }
        .card.correct::after { content: ' ✓'; margin-left: 5px; font-weight: bold; }
        .shake { animation: shake 0.3s; border-color: #e74c3c !important; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        
        /* 하단 버튼 */
        .footer { padding: 15px; background: #eee; text-align: center; }
        #next-btn { background: var(--main-yellow); border: none; padding: 12px 30px; font-weight: bold; border-radius: 50px; cursor: pointer; font-size: 1rem; box-shadow: 0 4px #b8860b; }
        #next-btn:active { transform: translateY(2px); box-shadow: 0 2px #b8860b; }
        .progress-text { font-size: 0.8rem; color: #777; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="phone-screen">
        <div class="app-container">
            <div class="header">짝맞추기 챌린지 (UNIT 02)</div>
            <div class="quiz-body">
                <div class="column" id="en-col"></div>
                <div class="column" id="ko-col"></div>
            </div>
            <div class="footer">
                <div class="progress-text" id="status-text">로딩 중...</div>
                <button id="next-btn" onclick="startNewSet()">다음 문제 (5개)</button>
            </div>
        </div>
    </div>

    <script>
        // PDF에서 추출한 117개 단어 데이터 전체
        const fullWordList = [
            // # 범죄
            {en: "crime", ko: "범죄"},

            {en: "abuse", ko: "학대, 남용"},
            {en: "child abuse", ko: "아동 학대"},
            {en: "drug abuse", ko: "약물 남용"},
            {en: "investigate", ko: "수사하다"},
            {en: "warrant", ko: "영장"},
            {en: "search warrant", ko: "수색 영장"},
            {en: "arrest warrant", ko: "구속 영장"},
            {en: "imprison, incarcerate", ko: "감금하다, 투옥하다"},
            {en: "suspect", ko: "용의자"},
            {en: "culprit", ko: "범인"},
            {en: "apprehend, arrest", ko: "체포하다"},
            {en: "domestic violence", ko: "가정 폭력"},
            {en: "prevent heinous crimes", ko: "흉악범죄를 예방하다"},
            {en: "victim", ko: "희생자, 피해자"},

            // # 법
            {en: "trial", ko: "재판"},
            {en: "verdict", ko: "평결"},
            {en: "life in prison", ko: "무기징역[종신형]"},
            {en: "death penalty, capital punishment", ko: "사형"},
            {en: "death sentence", ko: "사형 선고"},
            {en: "abolish the death penalty", ko: "사형제를 폐지하다"},
            {en: "justice", ko: "공정성, 정당성"},
            {en: "judge", ko: "판사"},
            {en: "prosecutor", ko: "검사"},
            {en: "enforce a law", ko: "법을 시행하다"},
            {en: "liability", ko: "법적 책임"},
            {en: "lawyer", ko: "변호사"},
            {en: "attorney", ko: "변호사, 법률대리인, (지역) 검사"},
            {en: "charge", ko: "혐의, 기소"},
            {en: "convict, find guilty of", ko: "유죄 판결하다"},
            {en: "alleged", ko: "주장된"},
            {en: "innocent", ko: "무죄의"},
            {en: "confiscate", ko: "압수하다, 몰수하다"},
            {en: "human rights", ko: "인권"},
            {en: "repeal", ko: "(법률을) 폐지하다"},
            {en: "testify", ko: "증언하다"},
            {en: "witness", ko: "목격하다, 목격자"},
            {en: "release", ko: "풀어주다, 석방하다"},
            {en: "amnesty", ko: "사면"},
            {en: "violate", ko: "위반하다"},
            {en: "constitution", ko: "헌법"},
            {en: "custody", ko: "(재판 전의) 유치, 구류"},
            {en: "Constitutional Court", ko: "헌법재판소"},
            {en: "democracy", ko: "민주주의"},
            {en: "unconstitutional", ko: "위헌적인"},

            // # 외교
            {en: "policy", ko: "정책"},
            {en: "political party", ko: "정당"},
            {en: "the ruling party", ko: "여당"},
            {en: "an opposition party", ko: "야당"},
            {en: "monarchy", ko: "군주제"},
            {en: "strategy", ko: "전략"},
            {en: "dictatorship", ko: "독재"},
            {en: "tactic", ko: "전술"},
            {en: "dictator", ko: "독재자"},
            {en: "conspiracy", ko: "음모"},
            {en: "politics", ko: "정치"},
            {en: "politician", ko: "정치인"},
            {en: "manipulate", ko: "(교묘히) 조종하다, 조작하다"},
            {en: "crisis", ko: "위기"},
            {en: "conservative", ko: "보수적인"},
            {en: "liberal", ko: "진보적인"},
            {en: "moderate", ko: "온건한"},
            {en: "radical", ko: "과격한"},
            {en: "ardent", ko: "열렬한, 열정적인"},
            {en: "advocate", ko: "지지하다, 지지자"},
            {en: "diplomatic", ko: "외교적인"},
            {en: "diplomacy", ko: "외교"},
            {en: "proponents", ko: "찬성파, 지지자들"},
            {en: "opponents", ko: "반대파, 반대자들"},
            {en: "poll", ko: "여론조사"},
            {en: "summit talks", ko: "정상 회담"},
            {en: "accuse, condemn", ko: "비난하다"},
            {en: "concession", ko: "양보"},
            {en: "approval rating", ko: "지지율"},
            {en: "mandate", ko: "(국민의) 명령"},
            {en: "compromise", ko: "타협"},
            {en: "order", ko: "(사령관의) 명령"},
            {en: "peace treaty", ko: "평화조약"},

            // # 정치, 선거
            {en: "election", ko: "선거"},
            {en: "refugee", ko: "난민, 망명자"},
            {en: "confrontation", ko: "대치, 대립"},
            {en: "run for", ko: "출마하다, 입후보하다"},
            {en: "vote", ko: "투표하다"},
            {en: "majority", ko: "(대)다수, 과반수"},
            {en: "candidate", ko: "후보"},
            {en: "minority", ko: "소수"},
            {en: "government", ko: "정부"},
            {en: "be elected", ko: "당선되다"},
            {en: "administration", ko: "행정부"},
            {en: "predecessor", ko: "전임자"},
            {en: "legislature", ko: "입법부"},
            {en: "successor", ko: "후임자"},
            {en: "judiciary", ko: "사법부"},
            {en: "National Assembly, Congress, Parliament", ko: "의회, 국회"},
            {en: "impeachment", ko: "탄핵"},
            {en: "corruption", ko: "부패"},
            {en: "representative, legislator, lawmaker", ko: "국회의원"},
            {en: "spokesperson", ko: "대변인"},
            {en: "Supreme Court", ko: "대법원"},
            {en: "minister", ko: "장관"},

            // # 시위 및 쿠데타
            {en: "demonstrate against", ko: "~에 반대하여 시위하다"},
            {en: "soar, surge, skyrocket", ko: "급등하다"},
            {en: "coup (d'état)", ko: "쿠데타"},
            {en: "revolution", ko: "혁명"},
            {en: "backfire", ko: "역효과를 낳다"},
            {en: "standoff", ko: "대치(상태)"},
            {en: "tense", ko: "일촉즉발의, 긴장된"},
            {en: "aggravate", ko: "(좋지 못한 상황을) 악화시키다"},
            {en: "topple", ko: "(권력의 자리에서) 끌어내리다"},
            {en: "execute", ko: "처형하다"},
            {en: "oust", ko: "추방하다, 축출하다"},
            {en: "plunge, plummet", ko: "급락하다"},

            // # 경제
            {en: "currency", ko: "통화, 화폐"},
            {en: "pension", ko: "연금"},
            {en: "shareholder", ko: "주주"},
            {en: "exchange rate", ko: "환율"},
            {en: "fluctuate", ko: "변동을 거듭하다"},
            {en: "income", ko: "수입, 소득"},
            {en: "expenditure", ko: "지출"},
            {en: "asset", ko: "자산"},
            {en: "capital", ko: "자본"},
            {en: "debt", ko: "부채"},
            {en: "take out a loan", ko: "대출받다"},
            {en: "mortgage loan", ko: "주택 담보 대출"},
            {en: "recession, stagnation", ko: "불경기"},
            {en: "bankruptcy", ko: "파산"},
            {en: "auction", ko: "경매"},
            {en: "stipulation", ko: "조항, 조건"},
            {en: "seed money", ko: "종자돈"},
            {en: "invest", ko: "투자하다"},
            {en: "investment", ko: "투자"},
            {en: "stock", ko: "주식"},
            {en: "bond", ko: "채권"},
            {en: "export", ko: "수출"},
            {en: "import", ko: "수입"},
            {en: "surplus", ko: "흑자, 잉여"},
            {en: "deficit", ko: "적자, 부족"}
        ];

        let selectedEnCard = null;
        let selectedKoCard = null;
        let wrongWords = []; // [추가] 틀린 단어를 저장할 배열

        function startNewSet() {
            const enCol = document.getElementById('en-col');
            const koCol = document.getElementById('ko-col');
            const status = document.getElementById('status-text');

            enCol.innerHTML = '';
            koCol.innerHTML = '';
            selectedEnCard = null;
            selectedKoCard = null;
        
            // [수정] 문제 추출 로직
            let currentBatch = [];

            // 1. 틀린 단어가 있다면 우선적으로 가져옴 (최대 7개)
            if (wrongWords.length > 0) {
                currentBatch = [...wrongWords].slice(0, 5);
                // 이미 가져온 단어는 오답 노트에서 일단 제거 (맞추면 영구 제거, 또 틀리면 다시 추가됨)
                wrongWords = wrongWords.slice(currentBatch.length);
            }
        
            // 2. 7개가 안 되면 나머지 부족한 만큼 전체 리스트에서 랜덤하게 채움
            const needed = 5 - currentBatch.length;
            if (needed > 0) {
                const remainingPool = fullWordList.filter(word => !currentBatch.includes(word));
                const extraWords = remainingPool.sort(() => 0.5 - Math.random()).slice(0, needed);
                currentBatch = [...currentBatch, ...extraWords];
            }
        
            status.innerText = `남은 오답: ${wrongWords.length}개 | 현재 5개 진행 중`;
        
            // 이하 카드 생성 로직은 동일
            const shuffledEn = [...currentBatch].sort(() => 0.5 - Math.random());
            const shuffledKo = [...currentBatch].sort(() => 0.5 - Math.random());
        
            shuffledEn.forEach(item => {
                const card = createCard(item.en, item.en, 'en', item); // 원본 객체 전달
                enCol.appendChild(card);
            });
        
            shuffledKo.forEach(item => {
                const card = createCard(item.ko, item.en, 'ko', item);
                koCol.appendChild(card);
            });
        }

        // [수정] createCard 함수에 item 인자 추가
        function createCard(text, matchValue, type, originalItem) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerText = text;
            card.dataset.value = matchValue;
            card.dataset.type = type;
            card.originalItem = originalItem; // [추가] 오답 저장을 위해 원본 객체 보관
        
            card.onclick = function() {
                if (card.classList.contains('correct')) return;
                const siblingCards = card.parentElement.querySelectorAll('.card');
                siblingCards.forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                if (type === 'en') selectedEnCard = card;
                else selectedKoCard = card;
                checkMatch();
            };
            return card;
        }

        function checkMatch() {
            if (selectedEnCard && selectedKoCard) {
                if (selectedEnCard.dataset.value === selectedKoCard.dataset.value) {
                    selectedEnCard.classList.replace('selected', 'correct');
                    selectedKoCard.classList.replace('selected', 'correct');
                    selectedEnCard = null;
                    selectedKoCard = null;
                } else {
                    // [수정] 오답 발생 시 틀린 단어 리스트에 추가
                    const failedWord = selectedEnCard.originalItem;
                    if (!wrongWords.some(w => w.en === failedWord.en)) {
                        wrongWords.push(failedWord);
                    }
                
                    const cardA = selectedEnCard;
                    const cardB = selectedKoCard;
                    cardA.classList.add('shake');
                    cardB.classList.add('shake');

                    setTimeout(() => {
                        cardA.classList.remove('selected', 'shake');
                        cardB.classList.remove('selected', 'shake');
                    }, 400);

                    selectedEnCard = null;
                    selectedKoCard = null;

                    // 상태 텍스트 업데이트
                    document.getElementById('status-text').innerText = `남은 오답: ${wrongWords.length}개 | 현재 진행 중`;
                }
            }
        }

        // 앱 시작
        window.onload = startNewSet;
    </script>
</body>
</html>
